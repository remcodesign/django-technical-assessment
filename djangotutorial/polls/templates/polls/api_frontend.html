{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Polls API Frontend</title>
    <link rel="stylesheet" href="{% static 'polls/api_frontend.css' %}" />
    <script defer src="{% static 'polls/api_frontend.js' %}"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body>
    <main
      x-data="pollsFrontend()"
      x-init="init()"
      x-cloak
      data-api-base-url="{{ api_base_url|escape }}"
      data-audit-base-url="{{ audit_base_url|escape }}"
      data-is-authenticated="{{ request.user.is_authenticated|yesno:'true,false' }}"
    >
      <h1>Polls API Frontend</h1>
      <p class="muted">
        This page reads and writes through the REST API instead of Django forms.
      </p>

      <div class="tabs" role="tablist" aria-label="Polls and audit navigation">
        <button
          type="button"
          class="tab-button"
          :class="{ active: activeTab === 'polls' }"
          @click="switchTab('polls')"
        >
          Polls
        </button>
        <button
          type="button"
          class="tab-button"
          :class="{ active: activeTab === 'audit' }"
          @click="switchTab('audit')"
        >
          Audit log
        </button>
      </div>

      <template x-if="loadError">
        <p class="error" x-text="loadError"></p>
      </template>

      <div class="layout" x-show="activeTab === 'polls'" x-cloak>
        <section class="panel sticky">
          <h2>Polls</h2>
          <template x-if="loadingQuestions">
            <p>Loading polls...</p>
          </template>
          <template x-if="!loadingQuestions && questions.length === 0">
            <p>No polls are available.</p>
          </template>
          <ul class="question-list">
            <template x-for="question in questions" :key="question.id">
              <li class="question-item">
                <button
                  :class="{
                    'question-button': true,
                    'selected-question': selectedQuestion && selectedQuestion.id === question.id,
                  }"
                  type="button"
                  @click="openQuestion(question.id)"
                >
                  <strong x-text="question.id"></strong>
                  ::
                  <strong x-text="question.question_text"></strong>
                  <div class="stats">
                    <span x-text="question.choice_count"></span>
                    <span x-text="question.choice_count === 1 ? 'choice' : 'choices'"></span>
                  </div>
                </button>
              </li>
            </template>
          </ul>
        </section>

        <section class="panel" x-show="selectedQuestion" x-cloak>
          <template x-if="view === 'detail' && selectedQuestion">
            <div>
              <h2 x-text="selectedQuestion.question_text"></h2>
              <template x-if="!isAuthenticated">
                <p>
                  You must be logged in to vote. Since there is no public login
                  page in this phase, please login via the
                  <a href="{% url 'admin:index' %}">admin</a>
                  first.
                </p>
              </template>

              <div x-show="isAuthenticated">
                <template x-if="selectedQuestion.choices.length > 0">
                  <form @submit.prevent="vote()">
                    <fieldset>
                      <legend>
                        <span class="muted">
                          Choose one option and submit the vote through the API.
                        </span>
                      </legend>
                      <template
                        x-for="choice in selectedQuestion.choices"
                        :key="choice.id"
                      >
                        <div>
                          <input
                            type="radio"
                            :id="`choice-${choice.id}`"
                            name="choice"
                            :value="choice.id"
                            x-model="selectedChoiceId"
                            :disabled="selectedQuestion.user_choice_id"
                          />
                          <label
                            :for="`choice-${choice.id}`"
                            x-text="choice.choice_text"
                          ></label>
                        </div>
                      </template>
                    </fieldset>

                    <template x-if="selectedQuestion.user_choice_id">
                      <p class="muted">
                        You already voted for
                        <strong
                          x-text="selectedQuestion.choices.find(
                            (choice) => choice.id === selectedQuestion.user_choice_id
                          )?.choice_text"
                        ></strong>.
                      </p>
                    </template>

                    <button type="submit" :disabled="selectedQuestion.user_choice_id">
                      Vote
                    </button>
                  </form>
                </template>

                <template x-if="errorMessage">
                  <p class="error" x-text="errorMessage"></p>
                </template>

                <template
                  x-if="selectedQuestion.choices && selectedQuestion.choices.length === 0"
                >
                  <p class="muted">This poll currently has no options.</p>
                </template>

                <div class="choice-management">
                  <h3>Manage choices</h3>
                  <form @submit.prevent="createChoice()">
                    <label for="new-choice-text">Add a choice</label>
                    <input
                      id="new-choice-text"
                      type="text"
                      maxlength="200"
                      x-model="newChoiceText"
                      placeholder="Enter new choice text"
                    />
                    <button type="submit" class="primary-button">Add choice</button>
                  </form>

                  <template
                    x-if="selectedQuestion.choices && selectedQuestion.choices.length > 0"
                  >
                    <div>
                      <h4>Edit choice</h4>
                      <ul class="choice-list">
                        <template
                          x-for="choice in selectedQuestion.choices"
                          :key="choice.id"
                        >
                          <li>
                            <template x-if="editingChoiceId === choice.id">
                              <form
                                class="choice-row editing"
                                @submit.prevent="saveChoice(choice.id)"
                                @focusout="handleChoiceFocusOut(choice.id)"
                              >
                                <input
                                  :id="`edit-choice-${choice.id}`"
                                  type="text"
                                  maxlength="200"
                                  x-model="editingChoiceText"
                                  aria-label="Edit choice text"
                                  @keydown.enter.prevent="saveChoice(choice.id)"
                                  @keydown.escape.prevent="cancelEditChoice()"
                                  autofocus
                                />
                                <div class="choice-actions">
                                  <button
                                    type="submit"
                                    @mousedown="preventChoiceBlurSave()"
                                  >
                                    Save choice
                                  </button>
                                  <button
                                    type="button"
                                    @mousedown="preventChoiceBlurSave()"
                                    @click="cancelEditChoice()"
                                  >
                                    Cancel
                                  </button>
                                </div>
                              </form>
                            </template>

                            <template x-if="editingChoiceId !== choice.id">
                              <div
                                class="choice-row"
                                :class="{ 'selected-choice': selectedChoiceId === choice.id }"
                              >
                                <span x-text="choice.choice_text"></span>
                                <div class="choice-actions">
                                  <button
                                    type="button"
                                    @click="startEditChoice(choice)"
                                  >
                                    Edit
                                  </button>
                                  <button
                                    type="button"
                                    class="choice-delete-button"
                                    @click="deleteChoice(choice)"
                                  >
                                    Delete
                                  </button>
                                </div>
                              </div>
                            </template>
                          </li>
                        </template>
                      </ul>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>

          <template x-if="view === 'results' && selectedQuestion">
            <div>
              <h2 x-text="selectedQuestion.question_text"></h2>
              <ul class="choice-list">
                <template
                  x-for="choice in selectedQuestion.choices"
                  :key="choice.id"
                >
                  <li>
                    <span x-text="choice.choice_text"></span>
                    --
                    <span x-text="choice.votes"></span>
                    vote
                    <span x-text="choice.votes === 1 ? '' : 's'"></span>
                  </li>
                </template>
              </ul>
              <button type="button" @click="backToIndex()">
                Back to polls
              </button>
            </div>
          </template>

          <template x-if="!selectedQuestion">
            <p class="muted">
              Select a poll on the left to view choices and vote.
            </p>
          </template>
        </section>
      </div>

      <section class="panel audit-panel" x-show="activeTab === 'audit'" x-cloak>
        <h2>Audit log</h2>
        <p class="muted">
          Review who changed which poll data, with paging and simple filters.
        </p>
        <div class="audit-header">
          <p class="muted audit-count">
            Total
            <strong x-text="auditCount"></strong>
            entries
          </p>
          <button type="button" class="reset-count-button" @click="resetAuditFilters()">
            Reset filters
          </button>
        </div>

        <div class="audit-controls">
          <label>
            <span>User</span>
            <input
              type="text"
              list="audit-users"
              placeholder="Username"
              x-model="auditUserFilter"
              @input.debounce.250ms="loadAuditLogs()"
            />
            <datalist id="audit-users">
              <template x-for="user in auditUserOptions" :key="user">
                <option :value="user"></option>
              </template>
            </datalist>
          </label>

          <label>
            <span>Model</span>
            <select x-model="auditModelFilter" @change="loadAuditLogs()">
              <option value="">All models</option>
              <option value="Choice">Choice</option>
              <option value="UserVote">UserVote</option>
            </select>
          </label>

          <label>
            <span>Event</span>
            <select x-model="auditEventFilter" @change="loadAuditLogs()">
              <option value="">All events</option>
              <option value="vote">vote</option>
              <option value="create">create</option>
              <option value="update">update</option>
              <option value="delete">delete</option>
            </select>
          </label>
        </div>

        <template x-if="auditLoading">
          <p>Loading audit log...</p>
        </template>

        <template x-if="auditError">
          <p class="error" x-text="auditError"></p>
        </template>

        <template x-if="!auditLoading && auditEntries.length === 0">
          <p class="muted">No audit entries found for the current filters.</p>
        </template>

        <ul class="audit-list">
          <template x-for="entry in auditEntries" :key="entry.id">
            <li class="audit-card">
              <div class="audit-card-header">
                <strong
                  class="audit-actor"
                  @click="setAuditUserFilter(entry.actor)"
                  title="Filter by this user"
                  x-text="entry.actor"
                ></strong>
                <span class="audit-badge audit-badge-model" x-text="entry.model"></span>
                <span class="audit-badge audit-badge-event" x-text="entry.event"></span>
                <span x-text="entry.created_at"></span>
              </div>

              <div class="audit-card-body">
                <p>
                  <span class="muted">Object</span>
                  <strong x-text="entry.object_id"></strong>
                </p>

                <p>
                  <span class="muted">From</span>
                  <code class="audit-snapshot" x-text="entry.change_from || '-' "></code>
                </p>

                <p>
                  <span class="muted">To</span>
                  <code class="audit-snapshot" x-text="entry.change_to || '-' "></code>
                </p>
              </div>
            </li>
          </template>
        </ul>

        <div class="audit-pagination">
          <button type="button" :disabled="!auditPreviousUrl" @click="previousAuditPage()">
            Previous
          </button>
          <button type="button" :disabled="!auditNextUrl" @click="nextAuditPage()">
            Next
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
